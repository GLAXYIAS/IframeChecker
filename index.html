<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Iframe Tester</h2>
    <div class="controls">
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://example.com" onkeypress="if(event.key === 'Enter') startTest()">
            <button onclick="startTest()">Test Iframe</button>
        </div>
        
        <div class="progress-container" id="progressCont">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div id="result-container">
        <div class="status-msg" id="statusMsg">Loading preview...</div>
        <div class="preview-box">
            <iframe id="testerFrame"></iframe>
        </div>
        
        <p style="font-size: 0.85em; color: #64748b; margin-top: 10px;">
            <b>Detection:</b> If the box above says "Refused to Connect" or stays blank, the site <b>failed</b> the iframe test.
        </p>
    </div>

    <script>
        function startTest() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            // Ensure protocol exists
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            const container = document.getElementById('result-container');
            const frame = document.getElementById('testerFrame');
            const barCont = document.getElementById('progressCont');
            const bar = document.getElementById('progressBar');
            const msg = document.getElementById('statusMsg');

            // Reset UI
            container.style.display = 'block';
            barCont.style.display = 'block';
            bar.style.width = '0%';
            msg.innerText = "Connecting to " + url + "...";
            
            // Start the iframe load
            frame.src = url;

            // Fake "Fast" progress
            setTimeout(() => { bar.style.width = '30%'; }, 100);
            setTimeout(() => { bar.style.width = '60%'; }, 300);
            setTimeout(() => { bar.style.width = '90%'; }, 500);

            // When the iframe finishes (either success or the browser's error page)
            frame.onload = function() {
                bar.style.width = '100%';
                msg.innerText = "Test Complete.";
                
                // Hide progress bar after a short delay
                setTimeout(() => {
                    barCont.style.display = 'none';
                }, 500);
            };
        }
    </script>
</body>
</html>
