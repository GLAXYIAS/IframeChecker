<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Iframe & Connection Checker</h2>
    <div class="controls">
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://example.com" onkeypress="if(event.key === 'Enter') checkUrl()">
            <button onclick="checkUrl()">Test Website</button>
        </div>
        <div class="protocol-hint"><b>Reminder:</b> Start with <code>https://</code> or <code>http://</code></div>
    </div>

    <div id="result-container">
        <p><strong>Result:</strong> <span id="statusBadge" class="badge"></span></p>
        <p id="detailsText"></p>
        
        <span class="preview-label">Live Preview Box:</span>
        <div class="preview-box" id="previewBox">
            <iframe id="iframeTester"></iframe>
        </div>
        
        <div style="background: #fff3cd; padding: 15px; border-radius: 6px; font-size: 0.9em; color: #856404; margin-top: 15px; border-left: 5px solid #ffeeba;">
            <strong>Pro Tip:</strong> Always use the full address. 
            If the box is blank or says "Refused to connect," the site is blocking iframes for security.
        </div>
    </div>

    <script>
        async function checkUrl() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert("Please enter a URL first.");
                return;
            }
            
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            const container = document.getElementById('result-container');
            const badge = document.getElementById('statusBadge');
            const details = document.getElementById('detailsText');
            const frame = document.getElementById('iframeTester');

            container.style.display = 'block';
            frame.src = "about:blank"; 
            badge.className = 'badge';
            badge.innerText = "Checking...";
            details.style.color = "#666";
            details.innerText = "Attempting to connect to " + url;

            try {
                // Using AllOrigins proxy to check status
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                
                if (response.ok) {
                    badge.innerText = "WEBSITE ONLINE";
                    badge.className = 'badge success';
                    details.innerText = "Success! The site is reachable. Check the box below.";
                } else {
                    throw new Error();
                }
            } catch (err) {
                badge.innerText = "UNABLE TO VERIFY";
                badge.className = 'badge error';
                details.innerText = "Connection refused or URL is invalid. Check your spelling.";
            }

            frame.src = url;
        }
    </script>
</body>
</html>
