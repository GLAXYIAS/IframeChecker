<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Iframe Checker</h2>
    
    <div class="controls">
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://example.com" onkeypress="if(event.key === 'Enter') runScanner()">
            <button onclick="runScanner()">Start Scan</button>
        </div>
        
        <div class="progress-container" id="progressCont">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div id="result-container">
            <div class="status-msg" id="statusMsg">Ready to scan...</div>
        </div>
    </div>

    <div id="preview-area" style="display:none;">
        <div class="preview-box">
            <iframe id="testerFrame"></iframe>
        </div>
        <p style="font-size: 0.85em; color: #94a3b8; text-align: center;">
            <b>Scan Result:</b> If the box stays blank or shows a "Reset" error, the site is NOT iframeable.
        </p>
    </div>

    <script>
        function runScanner() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;

            const resContainer = document.getElementById('result-container');
            const previewArea = document.getElementById('preview-area');
            const frame = document.getElementById('testerFrame');
            const barCont = document.getElementById('progressCont');
            const bar = document.getElementById('progressBar');
            const msg = document.getElementById('statusMsg');

            // Setup UI
            resContainer.style.display = 'block';
            previewArea.style.display = 'block';
            barCont.style.display = 'block';
            frame.src = "about:blank";
            
            let progress = 0;
            bar.style.width = '0%';
            
            const scanSteps = [
                "Initializing connection...",
                "Requesting security headers...",
                "Analyzing X-Frame-Options...",
                "Checking Content-Security-Policy...",
                "Finalizing iframe injection..."
            ];

            // Simulation of a slow scan
            let step = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 15) + 5; // Random jump
                
                if (progress >= 100) {
                    progress = 100;
                    bar.style.width = '100%';
                    msg.innerText = "Scan Complete.";
                    frame.src = url; // Only load iframe at the end of the scan
                    clearInterval(interval);
                    
                    setTimeout(() => {
                        barCont.style.display = 'none';
                    }, 1000);
                } else {
                    bar.style.width = progress + '%';
                    // Update text based on progress
                    if (progress > step * 20) {
                        msg.innerText = scanSteps[step];
                        step++;
                    }
                }
            }, 400); // Speed of the "Scan"
        }
    </script>
</body>
</html>
